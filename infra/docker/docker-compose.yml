version: '3.9'

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cybersec_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # ─── Application Services ───────────────────────────────────────────────────
  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/cybersec_saas
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - OPENVAS_HOST=${OPENVAS_HOST:-openvas}
      - OPENVAS_PORT=9390
      - WAZUH_HOST=${WAZUH_HOST:-}
      - WAZUH_PORT=${WAZUH_PORT:-55000}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_WS_URL=ws://localhost:4004

volumes:
  postgres_data:
  redis_data:
